packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: false
  msw: false
# Security overrides for vulnerable transitive deps (Dependabot alerts).
# Force patched versions where the direct parent's range can't reach the fix.
overrides:
  "@babel/core@<=7.29.0": ">=7.29.6 <8"
  "@hono/node-server@<1.19.13": ">=1.19.13 <2"
  brace-expansion@>=5.0.0 <5.0.6: ">=5.0.6 <6"
  esbuild@>=0.27.3 <0.28.1: ">=0.28.1 <0.29"
  fast-uri@<=3.1.1: ">=3.1.2 <4"
  hono@<4.12.25: ">=4.12.25 <5"
  ip-address@<=10.1.0: ">=10.1.1 <11"
  js-yaml@>=4.0.0 <=4.1.1: ">=4.2.0 <5"
  postcss@<8.5.10: ">=8.5.10 <9"
  qs@>=6.11.1 <=6.15.1: ">=6.15.2 <7"
  undici@>=7.0.0 <7.28.0: ">=7.28.0 <8"
  ws@>=8.0.0 <8.21.0: ">=8.21.0 <9"
