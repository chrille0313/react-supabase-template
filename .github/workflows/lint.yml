name: Lint

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master", "development", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
